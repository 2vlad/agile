services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./corpus:/app/corpus:ro
      - ./bot.yaml:/app/bot.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  indexer:
    build: .
    env_file: .env
    volumes:
      - ./corpus:/app/corpus:ro
    command: ["python", "-m", "indexer.main"]
    depends_on:
      db:
        condition: service_healthy
    profiles: ["indexer"]

volumes:
  pgdata:
