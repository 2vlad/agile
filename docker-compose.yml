services:
  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./corpus:/app/corpus:ro
    restart: unless-stopped

  indexer:
    build: .
    env_file: .env
    volumes:
      - ./corpus:/app/corpus:ro
    command: ["python", "-m", "indexer.main"]
    profiles: ["indexer"]
